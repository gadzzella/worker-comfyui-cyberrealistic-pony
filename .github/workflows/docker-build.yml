name: Build & Push Docker Image

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          sudo docker system prune -af --volumes
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo rm -rf /usr/local/share/boost /usr/share/swift /opt/microsoft
          sudo apt-get clean
          sudo apt-get autoremove -y
          sudo apt-get purge -y snapd
          df -h

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: gadzela
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: gadzela/cyberrealistic-pony:latest
          build-args: |
            HUGGINGFACE_ACCESS_TOKEN=${{ secrets.HF_TOKEN }}
            CIVITAI_TOKEN=${{ secrets.CIVITAI_TOKEN }}
            MODEL_TYPE=none
            BASE_IMAGE=nvidia/cuda:11.8.0-cudnn8-runtime-ubuntu22.04
            CUDA_VERSION_FOR_COMFY=11.8
            ENABLE_PYTORCH_UPGRADE=true
            PYTORCH_INDEX_URL=https://download.pytorch.org/whl/cu118
          no-cache: true
          network: host
